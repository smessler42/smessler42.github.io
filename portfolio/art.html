        <link rel="icon" type="image/x-icon" href="images/handsock.jpg">

        <style>


            body {
                border:gray hidden 4px;
                margin:0;
            }

            header {
                z-index: 10000;
                position: sticky;
                padding: 0;
                top: 0px;
                width: 100%
            }
            .navbar ul {
                list-style-type: none;
                margin: 0;
                padding: 0;
                overflow: hidden;
                border: 1px solid #e7e7e7;
                background-color:#f3f3f3;
            }
            .navbar li {
                float: left;
                padding: 5px;
            }

            #navlogo {
                margin-top: 5px;
                display: block;
                color:#666;
                text-align: center;
                text-decoration: none;
            }

            #navbutton {
                display: block;
                color: #666;
                text-align: center;
                padding: 28px 28px;
                text-decoration: none;
                border: 1px hidden red;
                border-radius: 2px;
            }

            .navbar li #navbutton.active {
                color: white;
            }

            
            

            @media (max-width: 800px) {
                .example-image-gallery div {
                    width: calc(50% - 10px);
                }
            }

            /* Captions */

            .imagegallery div span {
                position: absolute;
                bottom: 5px;
                left: 0;
                width: 100%;
                box-sizing: border-box;
                background: white;
                color: black;
                text-align: center;
                padding: 5px 10px;
                font-size: 20px;
                opacity: 0;
                transform: translateY(100px);
                transition: transform 0.4s ease, opacity 0.5s ease;
            }

            .imagegallery div img {
                transition: transform 0.5s ease;
            }

            /* On Hover */

            .imagegallery div:hover span {
                opacity: 1;
                transform: none;
            }

            .imagegallery div:hover img {
                transform: scale(1.35) rotate(10deg);
            }

            .imggalleryimg {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .imagegallery {
                display: flex;
                flex-wrap: wrap;
            }

            .imagegallery div {
                margin: 5px;
                border: 5px solid;
                box-sizing: border-box;
                width: calc(25% - 10px);
                position: relative;
                overflow: hidden;
            }


            
        </style>
    </head>
